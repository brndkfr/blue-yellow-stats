<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#030712" />
  <title>Jets Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <style>
    button { touch-action: manipulation; }
  </style>
</head>
<body class="bg-gray-950 text-white min-h-screen"
      x-data="selector()"
      x-init="init()">

  <!-- Fixed header -->
  <header class="fixed top-0 left-0 right-0 z-10 bg-gray-900/95 backdrop-blur border-b border-gray-800 px-4 py-3">
    <div class="flex items-baseline gap-2">
      <span class="font-black text-lg text-blue-500">Jets</span>
      <span class="text-gray-400 text-sm font-medium">Spiele</span>
    </div>
  </header>

  <main class="pt-16 pb-8 px-4 space-y-6">

    <!-- Loading -->
    <div x-show="loading" class="flex items-center justify-center pt-20">
      <p class="text-gray-600 text-sm">Lade Spielplan…</p>
    </div>

    <!-- Error -->
    <div x-show="!loading && error" class="flex items-center justify-center pt-20 px-4">
      <p class="text-red-400 text-sm text-center" x-text="error"></p>
    </div>

    <div x-show="!loading && !error" x-cloak>

      <!-- Upcoming games -->
      <section x-show="upcoming.length > 0">
        <p class="text-xs text-gray-600 uppercase tracking-widest mb-3">Nächste Spiele</p>
        <div class="space-y-2">
          <template x-for="(game, i) in upcoming" :key="game.file">
            <a :href="'game.html?kader=' + game.file"
               :class="i === 0 ? 'border-l-4 border-blue-500 bg-gray-800' : 'bg-gray-800/60'"
               class="block rounded-2xl px-4 py-3 active:bg-gray-700 transition-colors">
              <div class="flex items-start justify-between gap-2">
                <div class="min-w-0">
                  <div class="flex items-center gap-1.5 mb-0.5 flex-wrap">
                    <span class="text-xs text-gray-400" x-text="game.date"></span>
                    <span class="text-xs font-bold text-yellow-400" x-text="game.time"></span>
                    <span
                      :class="game.home ? 'bg-blue-900 text-blue-300' : 'bg-gray-700 text-gray-400'"
                      class="text-xs px-1.5 py-0.5 rounded font-medium"
                      x-text="game.home ? 'Heim' : 'Auswärts'"
                    ></span>
                    <span
                      :class="typeBadge(game.type).cls"
                      class="text-xs px-1.5 py-0.5 rounded font-medium"
                      x-text="typeBadge(game.type).label"
                    ></span>
                    <span x-show="i === 0" class="text-xs bg-blue-600 text-white px-1.5 py-0.5 rounded font-bold">Jetzt</span>
                  </div>
                  <p class="font-bold text-base leading-tight" x-text="game.opponent"></p>
                  <p class="text-xs text-gray-500 mt-0.5 truncate" x-text="game.venue"></p>
                </div>
                <span class="text-gray-500 text-lg flex-shrink-0 mt-1">→</span>
              </div>
            </a>
          </template>
        </div>
      </section>

      <!-- Past games -->
      <section x-show="past.length > 0">
        <p class="text-xs text-gray-600 uppercase tracking-widest mb-3">Vergangene Spiele</p>
        <div class="space-y-2">
          <template x-for="game in past" :key="game.file">
            <a :href="'game.html?kader=' + game.file"
               class="block rounded-2xl px-4 py-3 bg-gray-800/30 opacity-50 active:opacity-70 transition-opacity">
              <div class="flex items-start justify-between gap-2">
                <div class="min-w-0">
                  <div class="flex items-center gap-2 mb-0.5">
                    <span class="text-xs text-gray-500" x-text="game.date"></span>
                    <span class="text-xs text-gray-500" x-text="game.time"></span>
                    <span class="text-xs text-gray-600" x-text="game.home ? 'Heim' : 'Auswärts'"></span>
                  </div>
                  <p class="font-semibold text-sm text-gray-400" x-text="game.opponent"></p>
                  <p class="text-xs text-gray-600 mt-0.5 truncate" x-text="game.venue"></p>
                </div>
                <span class="text-gray-700 flex-shrink-0 mt-1">→</span>
              </div>
            </a>
          </template>
        </div>
      </section>

      <!-- No games yet -->
      <section x-show="upcoming.length === 0 && past.length === 0">
        <p class="text-gray-600 text-sm text-center pt-12">Keine Spiele in games.json eingetragen.</p>
      </section>

      <!-- Vollkader divider -->
      <div class="border-t border-gray-800 pt-4">
        <p class="text-xs text-gray-600 uppercase tracking-widest mb-3">Kader</p>
        <a href="game.html"
           class="block rounded-2xl px-4 py-3 bg-gray-800/40 active:bg-gray-700 transition-colors">
          <div class="flex items-center justify-between">
            <div>
              <p class="font-semibold text-sm text-gray-300">Vollkader</p>
              <p class="text-xs text-gray-600 mt-0.5">Alle 30 Spieler — ohne Spielauswahl</p>
            </div>
            <span class="text-gray-600">→</span>
          </div>
        </a>
      </div>

    </div>
  </main>

  <script>
    const TYPE_LABELS = {
      regular: { label: 'Meisterschaft', cls: 'bg-gray-700 text-gray-300'    },
      cup:     { label: 'Cup',           cls: 'bg-yellow-700 text-yellow-200' },
      test:    { label: 'Testspiel',     cls: 'bg-purple-900 text-purple-300' },
    };

    function selector() {
      return {
        loading:  true,
        error:    null,
        upcoming: [],
        past:     [],

        typeBadge(type) {
          return TYPE_LABELS[type] ?? { label: type || '—', cls: 'bg-gray-700 text-gray-400' };
        },

        // Parse "DD.MM.YYYY" + "HH:MM" into a Date
        _parseDate(dateStr, timeStr) {
          const [dd, mm, yyyy] = dateStr.split('.');
          const [hh, min]      = timeStr.split(':');
          return new Date(+yyyy, +mm - 1, +dd, +hh, +min);
        },

        async init() {
          try {
            const res = await fetch('./games.json');
            if (!res.ok) throw new Error(`games.json nicht gefunden (HTTP ${res.status})`);
            const games = await res.json();

            const now = Date.now();
            const GAME_DURATION_MS = 90 * 60 * 1000;

            const tagged = games.map(g => ({
              ...g,
              _date: this._parseDate(g.date, g.time),
            }));

            // A game is "over" once its start time + 90 min has passed
            this.upcoming = tagged
              .filter(g => g._date.getTime() + GAME_DURATION_MS > now)
              .sort((a, b) => a._date - b._date);

            this.past = tagged
              .filter(g => g._date.getTime() + GAME_DURATION_MS <= now)
              .sort((a, b) => b._date - a._date);

          } catch (err) {
            this.error = err.message;
          } finally {
            this.loading = false;
          }
        },
      };
    }
  </script>
</body>
</html>
