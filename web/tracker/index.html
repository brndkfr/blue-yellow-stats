<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jets Tracker</title>
<link rel="manifest" href="./manifest.json" />
<meta name="theme-color" content="#0033a0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Jets" />
<link rel="apple-touch-icon" href="./icons/icon.svg" />
<link rel="stylesheet" href="./styles.css" />
<style>
  html, body { margin: 0; min-height: 100%; background: #080e1a; overflow-x: hidden; }

  .stage {
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 20px; box-sizing: border-box; gap: 14px;
  }

  /* ── Scout bar ── */
  #scout-bar {
    width: 390px; max-width: 100%;
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  #scout-bar .sb-label {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 11px; font-weight: 700; letter-spacing: .1em;
    text-transform: uppercase; color: rgba(255,255,255,.45);
    white-space: nowrap;
  }
  #scout-bar .sb-btn {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 13px; font-weight: 600;
    padding: 6px 14px; border-radius: 999px; cursor: pointer;
    border: 1px solid rgba(255,255,255,.22);
    background: rgba(255,255,255,.09); color: rgba(255,255,255,.75);
    transition: background .12s ease, color .12s ease, border-color .12s ease;
    white-space: nowrap;
  }
  #scout-bar .sb-btn:hover  { background: rgba(255,255,255,.15); color: #fff; }
  #scout-bar .sb-btn.active {
    background: rgba(255,205,0,.15); color: #ffcd00;
    border-color: rgba(255,205,0,.45);
  }
  #scout-input {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 13px; font-weight: 500;
    padding: 6px 12px; border-radius: 999px;
    border: 1px solid rgba(255,255,255,.2);
    background: rgba(255,255,255,.07); color: #fff; outline: none;
    width: 160px;
  }
  #scout-input::placeholder { color: rgba(255,255,255,.25); }
  #scout-input:focus { border-color: rgba(255,205,0,.5); background: rgba(255,205,0,.06); }

  /* ── Phone frame ── */
  .phone {
    width: 390px; max-width: calc(100vw - 40px); height: 760px; position: relative; overflow: hidden;
    border-radius: 44px; background: var(--bg-app);
    box-shadow: 0 0 0 11px #0b0e16, 0 0 0 13px #20242e, 0 40px 80px -24px rgba(0,0,0,.85);
    flex-shrink: 0;
  }
  .screen { position: absolute; inset: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .screen::-webkit-scrollbar { width: 0; }
  .screen { scrollbar-width: none; }
</style>
<script src="./config.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
    // Forward SW queue size updates to the React app via a custom event
    navigator.serviceWorker.addEventListener('message', (e) => {
      if (e.data && e.data.type === 'SW_QUEUE_SIZE') {
        window.dispatchEvent(new CustomEvent('jets-sw-queue', { detail: e.data.size }));
      }
      if (e.data && e.data.type === 'SW_QUEUE_ERROR') {
        window.dispatchEvent(new CustomEvent('jets-sw-error', { detail: e.data.params }));
      }
    });
  }
</script>
<script src="https://unpkg.com/lucide@0.544.0/dist/umd/lucide.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div class="stage">

    <!-- Scout bar — outside the React app, vanilla JS -->
    <div id="scout-bar">
      <span class="sb-label">Scout</span>
      <span id="scout-btns" style="display:contents"></span>
      <input id="scout-input" type="text" placeholder="Name eingeben…" />
    </div>

    <div class="phone"><div class="screen" id="root"></div></div>
  </div>

  <script>
    (function () {
      const LS_URL    = 'jets_script_url';
      const LS_SCOUT  = 'jets_scout';
      const btnsEl    = document.getElementById('scout-btns');
      const inputEl   = document.getElementById('scout-input');

      let currentScout = localStorage.getItem(LS_SCOUT) || '';
      if (currentScout) inputEl.value = currentScout;

      function selectScout(name) {
        currentScout = name;
        localStorage.setItem(LS_SCOUT, name);
        inputEl.value = name;
        document.querySelectorAll('.sb-btn').forEach((b) => {
          b.classList.toggle('active', b.dataset.name === name);
        });
      }

      function renderButtons(names) {
        btnsEl.innerHTML = '';
        names.forEach((name) => {
          const btn = document.createElement('button');
          btn.className = 'sb-btn' + (name === currentScout ? ' active' : '');
          btn.textContent = name;
          btn.dataset.name = name;
          btn.addEventListener('click', () => selectScout(name));
          btnsEl.appendChild(btn);
        });
        // If current scout isn't in the list, still show it as active in the input
        if (currentScout && !names.includes(currentScout)) {
          inputEl.value = currentScout;
        }
      }

      // Free-text fallback — typing in the input also sets the scout
      inputEl.addEventListener('change', () => {
        const name = inputEl.value.trim();
        if (name) selectScout(name);
      });

      // Config file takes priority over localStorage; sync to localStorage so the app picks it up
      const configUrl = window.JETS_CONFIG && window.JETS_CONFIG.scriptUrl;
      if (configUrl) localStorage.setItem(LS_URL, configUrl);

      // Load scout list from Google Sheets if URL is configured
      const scriptUrl = configUrl || localStorage.getItem(LS_URL);
      if (scriptUrl) {
        fetch(scriptUrl + '?action=scouts')
          .then((r) => r.json())
          .then((rows) => {
            const names = rows.map((r) => r.name).filter(Boolean);
            if (names.length) renderButtons(names);
          })
          .catch(() => {}); // silently fall back to text input
      }
    })();
  </script>

  <script type="text/babel" src="primitives.jsx"></script>
  <script type="text/babel" src="Schedule.jsx"></script>
  <script type="text/babel" src="LiveTracker.jsx"></script>
  <script type="text/babel" src="RosterEditor.jsx"></script>
  <script type="text/babel" src="SquadEditor.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
