<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Safe zone background (maskable: fills entire tile) -->
  <rect width="512" height="512" fill="#0033a0"/>
  <!-- Yellow accent stripe at bottom -->
  <rect y="390" width="512" height="122" fill="#ffcd00"/>
  <!-- Large "J" -->
  <text
    x="256" y="340"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="310" font-weight="900"
    text-anchor="middle"
    fill="#ffffff"
    letter-spacing="-8">J</text>
  <!-- "JETS" label inside the yellow bar -->
  <text
    x="256" y="476"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="72" font-weight="800"
    text-anchor="middle"
    fill="#0033a0"
    letter-spacing="18">JETS</text>
</svg>
